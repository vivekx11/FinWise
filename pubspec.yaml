name: finwise
description: "FinWise - A comprehensive finance calculator app for EMI, SIP, FD, RD and loan calculations."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  intl: ^0.19.0
  lottie: ^3.1.0
  shared_preferences: ^2.3.5
  provider: ^6.1.2
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - img/Finance.json
    - img/applogo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "img/applogo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "img/applogo.png"
